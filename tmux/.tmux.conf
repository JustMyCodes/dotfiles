# CONFIGURACAO GERAL
# Define o terminal interno do tmux como tmux-256color
# (evita o modo 'screen' antigo e habilita suporte a 256 cores)
set -g default-terminal "tmux-256color"

# Garante que todos os terminais usem cores verdadeiras (24-bit / true color)
set -ga terminal-overrides ',*:Tc'

set -g mouse on                 # habilita mouse
set -g set-clipboard on         # integra área de transferência
set -g detach-on-destroy off    # não sai do tmux ao fechar uma session (vai para a que estiver aberta)
set -g escape-time 10           # remove delay ao usar ESC no neovim
set -sg repeat-time 1000        # aumenta janela de tempo para repetir comandos sem repetir prefixo
set -g history-limit 1000000    # aumenta o histórico de linhas do scrollback
set -s focus-events on          # avisa apps (vim/neovim) quando pane ganha ou perde foco
setw -g automatic-rename on     # renomeia com o programa em execução no momento
set -g renumber-windows on      # reordena número das janelas
set -g display-time 5000        # Tempo das mensagens em milissegundos

# recarrega o arquivo de configuração sem reiniciar tmux
unbind r
bind r source-file ~/.tmux.conf \; display-message " 󰄬 Configuração recarregada!"

# índices iniciando em 1
set  -g base-index 1
setw -g pane-base-index 1

# adiciona novo prefixo (mantém padrão tmux: Ctrl + b)
set -g prefix2 C-Space
bind C-Space send-prefix -2


# GERENCIAMENTO DE JANELAS (ABAS)
unbind n
unbind p

bind c new-window -c "#{pane_current_path}" # customiza para nova janela ser no diretório atual

unbind ,
unbind .
bind -r n previous-window                   # janela anterior
bind -r m next-window                       # próxima janela

# trocar a ordem das janelas
bind -r M-n swap-window -t -1 \; select-window -t -1
bind -r M-m swap-window -t +1 \; select-window -t +1

bind W command-prompt "rename-window '%%'"                              # renomeia a janela (padrão: ^b + ,)
bind X confirm-before -p "DESEJA FECHAR A JANELA #W? (y/n)" kill-window # fecha a janela atual (padrão: ^ + &)


# GERENCIAMENTO DE PAINEIS (DIVISOES)
bind -r Space select-layout -n                                              # mudar layout com repetível habilitado
bind x confirm-before -p ">>> DESEJA FECHAR O PAINEL #P? (y/n)" kill-pane   # fechar painel

# splits mais intuitivos
bind-key | split-window -h -c "#{pane_current_path}"
bind-key - split-window -v -c "#{pane_current_path}"

# trocar a posição dos paineis na direção da setas (swap)
bind -r M-Left  swap-pane -s '{left-of}'
bind -r M-Right swap-pane -s '{right-of}'
bind -r M-Up    swap-pane -s '{up-of}'
bind -r M-Down  swap-pane -s '{down-of}'

# redimensiona paineis com Ctrl+Alt+Setas
bind -r C-M-Left  resize-pane -L 5
bind -r C-M-Down  resize-pane -D 5
bind -r C-M-Up    resize-pane -U 5
bind -r C-M-Right resize-pane -R 5


# MODO COPIA
bind Enter copy-mode    # define enter para entrar no modo copia

setw -g mode-keys vi    # teclas estilo vim no copy-mode

bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi V send -X select-line
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "xclip -selection clipboard -i || wl-copy || clip.exe"
bind -T copy-mode-vi Escape send -X cancel

bind b list-buffers     # abre lista com buffers de cópia do tmux (seleção carrega para uso posterior)
bind p paste-buffer -p  # cola buffer mais recente
bind P choose-buffer    # seleciona para colagem imediata

# padrão: seleção do mouse copia e sai do modo copia automaticamente
# esse unbind permite decisão manual de cópia (y) e cancelamento (ESC)
unbind -T copy-mode-vi MouseDragEnd1Pane


# STYLE
gray_light="#e8dfd6"
gray_medium="#61778d"
gray_dark="#2e3340"
green_light="#a2d9b1"
green_medium="#44b5b1"
green_dark="#065f73"
magenta="#ff5879"
magenta_dark="#d42144"

set -g status-position top
set -g status-left-length 100                       # aumenta espaço limite para suportar nomes de session longos
set -g status-left ""                               # limpa antes de montar com -ga
set -g status-style "fg=${gray_light},bg=default"
#set -g status-left "#[fg=${green_dark},bold] #S #[fg=${gray_light},nobold] | "
set -g status-left "#{?client_prefix,#[bg=${magenta}]#[fg=${gray_light}]#[bold],#[fg=${green_dark}]#[bold]}  #S #[bg=default]#[fg=${gray_light}]#[nobold]"

set -g status-justify "absolute-centre"
set -g window-status-current-format "#[fg=${green_light},bold]  #[fg=${green_medium},bold]#I:#W#{?window_zoomed_flag,#[fg=${magenta}] ,}"

set -g status-right-length 100                      # tamanho máximo da área direita
set -g status-right ""                              # limpa antes de montar
set -ga status-right "#[bg=#default,fg=#{gray_light}]  󰭦 %d-%m-%Y 󰅐 %H:%M "

set -g window-status-format " #I:#W"
set -g message-style "fg=${gray_light},bg=default"
set -g mode-style "fg=${gray_dark},bg=${green_light}"

set -g pane-border-style "fg=${green_dark}"
set -g pane-active-border-style "fg=${green_light}"

set -g pane-border-status top
set -g pane-border-format "#[fg=${green_light},bold]"

