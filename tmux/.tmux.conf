# CONFIGURACAO GERAL
# Define o terminal interno do tmux como tmux-256color
# (evita o modo 'screen' antigo e habilita suporte a 256 cores)
set -g default-terminal "tmux-256color"

# Garante que todos os terminais usem cores verdadeiras (24-bit / true color)
set -ga terminal-overrides ',*:Tc'

set -g mouse on                 # habilita mouse
set -g set-clipboard on         # integra área de transferência
set -g detach-on-destroy off    # não sai do tmux ao fechar uma session (vai para a que estiver aberta)
set -g escape-time 10           # remove delay ao usar ESC no neovim
set -sg repeat-time 1000        # aumenta janela de tempo para repetir comandos sem repetir prefixo
set -g history-limit 1000000    # aumenta o histórico de linhas do scrollback
set -s focus-events on          # avisa apps (vim/neovim) quando pane ganha ou perde foco
setw -g automatic-rename on     # renomeia com o programa em execução no momento
set -g renumber-windows on      # reordena número das janelas
#set -g status-position bottom   # posição da barra de status (padrão tmux: bottom)

# recarrega o arquivo de configuração sem reiniciar tmux
unbind r
bind r source-file ~/.tmux.conf

# índices iniciando em 1
set -g base-index 1
setw -g pane-base-index 1

# adiciona novo prefixo (mantém padrão tmux: Ctrl + b)
set -g prefix2 C-Space
bind C-Space send-prefix -2


# GERENCIAMENTO DE JANELAS (ABAS)
unbind n
unbind p

bind c new-window -c "#{pane_current_path}" # customiza para nova janela ser no diretório atual

bind -r M-Left  previous-window              # janela anterior
bind -r M-Right next-window                 # próxima janela

# trocar a ordem das janelas
bind -r C-M-Left    swap-window -t -1 \; select-window -t -1
bind -r C-M-Right   swap-window -t +1 \; select-window -t +1

bind Tab last-window                        # move para a última janela ativa (equivala ao Alt + Tab)

bind W command-prompt "rename-window '%%'"  # renomeia a janela (padrão: ^b + ,)
bind X kill-window                          # fecha a janela atual (padrão: ^ + &)


# GERENCIAMENTO DE PAINEIS (DIVISOES)
# splits mais intuitivos
bind-key | split-window -h -c "{pane_current_path}"
bind-key - split-window -v -c "{pane_current_path}"

# trocar a posição dos paineis na direção da setas (swap)
bind -r S-Left  swap-pane -L
bind -r S-Right swap-pane -R
bind -r S-Up    swap-pane -U
bind -r S-Down  swap-pane -D

# redimensiona paineis com Ctrl+Alt+Setas (sem prefixo)
bind -r C-S-Left  resize-pane -L 2
bind -r C-S-Down  resize-pane -D 2
bind -r C-S-Up    resize-pane -U 2
bind -r C-S-Right resize-pane -R 2


# MODO COPIA
bind Enter copy-mod     # define enter para entrar no modo copia

setw -g mode-keys vi    # teclas estilo vim no copy-mode

bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi V send -X select-line
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "xclip -selection clipboard -i || wl-copy || clip.exe"
bind P paste-buffer
bind -T copy-mode-vi Escape send -X cancel

bind b list-buffers     # abre lista com buffers de cópia do tmux (seleção carrega para uso posterior)
bind p paste-buffer -p  # cola buffer mais recente
bind P choose-buffer    # seleciona para colagem imediata

# padrão: seleção do mouse copia e sai do modo copia automaticamente
# esse unbind permite decisão manual de cópia (y) e cancelamento (ESC)
unbind -T copy-mode-vi MouseDragEnd1Pane


# STYLE
# paleta de cores nord
gray_light="#D8DEE9"
gray_medium="#ABB2BF"
gray_dark="#3B4252"
green_soft="#A3BE8C"
blue_muted="#81A1C1"
cyan_soft="#88C0D0"

red="#FFFF00"

set -g status-position top
set -g status-left-length 100                       # aumenta espaço limite para suportar nomes de session longos
set -g status-style "fg=${gray_light},bg=default"
set -g status-left "#[fg=${green_soft},bold] #S #[fg=${gray_light},nobold] | "
set -g window-status-current-format "#[fg=${green_soft},bold]  #I:#W#{?window_zoomed_flag,  ,}"
set -g window-status-format " #I:#W"
set -g message-style "fg=${gray_light},bg=default"
set -g mode-style "fg=${gray_dark},bg=${blue_muted}"

set -g pane-border-style "fg=${gray_dark}"
set -g pane-active-border-style "fg=${green_soft}"

set -g pane-border-status top
set -g pane-border-format "#[fg=${green_soft},bold]"


